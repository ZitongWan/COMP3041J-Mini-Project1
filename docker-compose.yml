# ==============================================================
# Campus Buzz - Hybrid Cloud Docker Compose setup
# ==============================================================
# Architecture:
#   - 3 containerized services running locally (Docker)
#   - 3 serverless functions deployed on Alibaba Cloud FC 3.0
#
# Setup steps:
#   1. Deploy FC functions first: s deploy --all
#   2. Put the function URLs into the .env file
#   3. Run: docker-compose up --build
#
# Flow:
#   [User] → Presentation (container) → Workflow (container) → [FC: submission event]
#                                                               ↓
#                                                      [FC: processing]
#                                                               ↓
#                                                      [FC: result update]
#                                                               ↓
#                                                      Data Service (container)
# ==============================================================

version: '3.8'

services:
  # ============================================================
  # Presentation Service (container) - port 5000
  # ============================================================
  presentation-service:
    build:
      context: ./presentation-service
      dockerfile: Dockerfile
    container_name: campus-buzz-presentation
    ports:
      - "5000:5000"
    environment:
      - WORKFLOW_SERVICE_URL=http://workflow-service:5001
      - DATA_SERVICE_URL=http://data-service:5002
      - FLASK_ENV=production
    depends_on:
      - workflow-service
      - data-service
    networks:
      - campus-buzz-net
    restart: unless-stopped

  # ============================================================
  # Workflow Service (container) - port 5001
  # ============================================================
  workflow-service:
    build:
      context: ./workflow-service
      dockerfile: Dockerfile
    container_name: campus-buzz-workflow
    ports:
      - "5001:5001"
    environment:
      - DATA_SERVICE_URL=http://campus-buzz-data:5002
      # ⚠️ Replace with the actual FC HTTP trigger URL after deployment
      # Example: https://xxxxx.cn-beijing.fc.aliyuncs.com
      - SUBMISSION_EVENT_FN_URL=${SUBMISSION_EVENT_FN_URL:-http://host.docker.internal:9001}
      - FLASK_ENV=production
    depends_on:
      - data-service
    networks:
      - campus-buzz-net
    restart: unless-stopped

  # ============================================================
  # Data Service (container) - port 5002
  # ============================================================
  data-service:
    build:
      context: ./data-service
      dockerfile: Dockerfile
    container_name: campus-buzz-data
    ports:
      - "5002:5002"
    environment:
      - DATABASE_PATH=/data/campus_buzz.db
      - FLASK_ENV=production
    volumes:
      - campus-buzz-data:/data
    networks:
      - campus-buzz-net
    restart: unless-stopped

networks:
  campus-buzz-net:
    driver: bridge

volumes:
  campus-buzz-data:
    driver: local
