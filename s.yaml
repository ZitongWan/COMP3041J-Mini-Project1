# ==============================================================
# Campus Buzz - 阿里云函数计算 FC 3.0 部署配置
# ==============================================================

edition: 3.0.0
name: campus-buzz
access: default

vars:
  region: cn-beijing
  service:
    name: campus-buzz
    description: Campus Buzz - Campus Event Submission System
    logConfig: auto

resources:
  # ----------------------------------------------------------
  # Submission Event Function
  # ----------------------------------------------------------
  submission-event-function:
    component: fc3
    props:
      region: ${vars.region}
      functionName: submission-event-function
      description: 将新提交事件转换为处理请求
      runtime: python3.10
      code: ./serverless/submission-event-function
      handler: app.handler
      timeout: 30
      memorySize: 256
      cpu: 0.25
      diskSize: 512
      installDependency: true
      environmentVariables:
        DATA_SERVICE_URL: "https://goldmine-washable-swimsuit.ngrok-free.dev"
        PROCESSING_FN_URL: "https://processfunction-socuuqhcyq.cn-beijing.fcapp.run"
      triggers:
        - triggerName: http-trigger
          triggerType: http
          description: HTTP触发器
          qualifier: LATEST
          triggerConfig:
            methods:
              - POST
              - GET
            authType: anonymous

  # ----------------------------------------------------------
  # Processing Function
  # ----------------------------------------------------------
  processing-function:
    component: fc3
    props:
      region: ${vars.region}
      functionName: processing-function
      description: 应用项目规则并计算结果
      runtime: python3.10
      code: ./serverless/processing-function
      handler: app.handler
      timeout: 30
      memorySize: 256
      cpu: 0.25
      diskSize: 512
      installDependency: true
      environmentVariables:
        RESULT_UPDATE_FN_URL: "https://result-function-himtzogrsl.cn-beijing.fcapp.run"
      triggers:
        - triggerName: http-trigger
          triggerType: http
          description: HTTP触发器
          qualifier: LATEST
          triggerConfig:
            methods:
              - POST
              - GET
            authType: anonymous

  # ----------------------------------------------------------
  # Result Update Function
  # ----------------------------------------------------------
  result-update-function:
    component: fc3
    props:
      region: ${vars.region}
      functionName: result-update-function
      description: 更新存储记录的处理结果
      runtime: python3.10
      code: ./serverless/result-update-function
      handler: app.handler
      timeout: 30
      memorySize: 256
      cpu: 0.25
      diskSize: 512
      installDependency: true
      environmentVariables:
        DATA_SERVICE_URL: "https://goldmine-washable-swimsuit.ngrok-free.dev"
      triggers:
        - triggerName: http-trigger
          triggerType: http
          description: HTTP触发器
          qualifier: LATEST
          triggerConfig:
            methods:
              - POST
              - GET
            authType: anonymous
